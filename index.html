<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bạn có xinh không?</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ffe4e1;
    font-family:Arial;
}

.box{
    text-align:center;
}

button{
    padding:12px 30px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
    <h1>Chị Linh có xinh không? 😏</h1>

    <button id="yesBtn">Có</button>
    <button id="noBtn">Không</button>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");

yesBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    yesBtn.style.position = "fixed";
    yesBtn.style.left = x + "px";
    yesBtn.style.top = y + "px";
});

document.getElementById("noBtn").addEventListener("click", () => {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:40px;
            color:#ff4081;
        ">
            😆 Thành thật là đức tính tốt!
        </div>
    `;
});
</script>

</body>
</html>
