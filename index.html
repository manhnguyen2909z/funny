
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chị Linh có xinh không?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd1dc,#ffe8f0);
}

.card{
    background:white;
    padding:50px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.1);
    width:90%;
    max-width:600px;
}

h1{
    color:#ff5c8a;
    margin-bottom:30px;
    font-size:36px;
}

p{
    font-size:22px;
    margin-bottom:30px;
    color:#555;
}

button{
    border:none;
    padding:14px 32px;
    margin:10px;
    border-radius:999px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.yes{
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
}

.no{
    background:white;
    color:#ff5c8a;
}

button:hover{
    transform:translateY(-3px);
}

.result{
    font-size:28px;
    color:#ff5c8a;
    line-height:1.8;
}
</style>
</head>
<body>

<div class="card">
    <h1>🌸 Chị Linh có xinh không? 🌸</h1>

    <p id="question">
        Chị Linh có xinh không? 🥰
    </p>

    <div id="actions">
        <button class="yes" onclick="showResult()">Có ❤️</button>
        <button class="no" onclick="nextQuestion()">Không 😏</button>
    </div>
</div>

<script>
const questions = [
    "Chị Linh chắc chưa? 🤔",
    "Chị Linh soi gương hôm nay chưa? 😏",
    "Chị Linh có đang khiêm tốn quá không? 😌",
    "Chị Linh có muốn trả lời lại không? 😂",
    "AI đang kiểm tra dữ liệu... 🤖",
    "Hệ thống phát hiện câu trả lời chưa chính xác 😆"
];

let index = 0;

function nextQuestion(){
    if(index < questions.length){
        document.getElementById("question").innerText = questions[index];
        index++;
    }else{
        showResult();
    }
}

function showResult(){
    document.querySelector(".card").innerHTML = `
        <div class="result">
            ❤️ KẾT QUẢ XÁC MINH ❤️
            <br><br>
            ✔ Dễ thương
            <br>
            ✔ Xinh
            <br>
            ✔ Cười đẹp
            <br>
            ✔ Trả lời chưa khách quan
            <br><br>
            🌸 Kết luận cuối cùng:
            <br>
            <b>Chị Linh xinh nhé ❤️</b>
        </div>
    `;
}
</script>

</body>
</html>
