
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mini Game</title>
<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd1dc,#ffe8f0);
    font-family:Arial;
    overflow:hidden;
}

.card{
    background:white;
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.1);
    width:400px;
}

h1{
    color:#ff5c8a;
}

button{
    border:none;
    padding:14px 30px;
    margin:10px;
    border-radius:999px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

#yesBtn{
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
}

#noBtn{
    background:white;
    color:#ff5c8a;
}

button:hover{
    transform:translateY(-3px);
}

.result{
    font-size:28px;
    color:#ff5c8a;
}
</style>
</head>

<body>

<div class="card">
    <h1 id="question">Chị Linh có xinh không? 😏</h1>

    <div id="btns">
        <button id="yesBtn">Có ❤️</button>
        <button id="noBtn">Không 😌</button>
    </div>

    <div id="result"></div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const question = document.getElementById("question");
const result = document.getElementById("result");

let questions = [
    "Chắc chưa?",
    "Nghĩ lại đi 😏",
    "Thật sự luôn?",
    "Không thay đổi à?",
    "Đang kiểm tra lại...",
    "AI nghi ngờ câu trả lời 🤖"
];

let index = 0;

// nút có → chạy trốn + hỏi liên tục
yesBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    yesBtn.style.position = "fixed";
    yesBtn.style.left = x + "px";
    yesBtn.style.top = y + "px";

    question.innerText = questions[index % questions.length];
    index++;
});

// nút không → kết luận
noBtn.addEventListener("click", () => {
    document.querySelector(".card").innerHTML = `
        <div class="result">
            😌 Thành thật là một đức tính tốt
        </div>
    `;
});
</script>

</body>
</html>
